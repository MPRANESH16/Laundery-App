<template>

    <lightning-card title="Order" icon-name="standard:orders">

        <div class="slds-m-around_medium">

            <lightning-record-edit-form
                object-api-name="Order__c"
                onsuccess={handleSuccess}
                onerror={handleError}>

                <lightning-messages></lightning-messages>

                <lightning-input-field field-name="Customer_Contact__c"></lightning-input-field>

                <lightning-input-field field-name="Laundery_Contact__c"></lightning-input-field>

                <lightning-input-field field-name="Delivery_Contact__c"></lightning-input-field>

                <lightning-input-field field-name="Date_Of_Pickup__c"></lightning-input-field>

                <lightning-input-field field-name="Date_Of_Delivery__c"></lightning-input-field>

                <lightning-input-field field-name="Number_of_Buckets__c"></lightning-input-field>

                <lightning-input-field field-name="Description__c"></lightning-input-field>

                <lightning-input-field field-name="Laundery_Type__c"></lightning-input-field>

                <lightning-input-field field-name="Payment_Type__c"></lightning-input-field>

                <br/>

                <lightning-button
                    type="submit"
                    label="Place Order"
                    variant="brand">
                </lightning-button>

                <lightning-button
                    label="Pay Now"
                    variant="success"
                    onclick={handlePayment}
                    disabled={isPayDisabled}
                    class="slds-m-left_small">
                </lightning-button>

            </lightning-record-edit-form>

        </div>

    </lightning-card>

    <template if:true={showIframe}>

        <iframe
    src={iframeUrl}
    onload={handleIframeLoad}
    width="800"
    height="600"
    style="border:2px solid red;">
</iframe>
    </template>

</template>
