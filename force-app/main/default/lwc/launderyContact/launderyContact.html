<template>
    <lightning-card title="Laundery Contact" icon-name="standard:contact">
        <div class="slds-m-around_medium">

            <lightning-record-edit-form
                object-api-name="Laundery_Contact__c"
                onsuccess={handleSuccess}>

                <lightning-messages></lightning-messages>

                <lightning-input-field field-name="Name"></lightning-input-field>
                <lightning-input-field field-name="Owner_Name__c"></lightning-input-field>                
                <lightning-input-field field-name="Address__c"></lightning-input-field>
                <lightning-input-field field-name="License__c"></lightning-input-field>
                <lightning-input-field field-name="Gender__c"></lightning-input-field>
                <lightning-input-field field-name="Date_of_Birth__c"></lightning-input-field>
                <lightning-input-field field-name="Phone_Number__c"></lightning-input-field>
                <lightning-input-field field-name="Email__c"></lightning-input-field>
                <lightning-input-field field-name="Year_of_Experience__c"></lightning-input-field>

                <br/>

                <lightning-button
                    type="submit"
                    label="Save"
                    variant="brand">
                </lightning-button>

            </lightning-record-edit-form>

        </div>
    </lightning-card>
</template>
